# Redirect plain HTTP → HTTPS (Mic/getUserMedia requires a secure context).
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name _;

    ssl_certificate     /etc/ssl/certs/cookidoo-selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/cookidoo-selfsigned.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 32M;

    # Embedded Claude-Code chat via ttyd (port 7681). The /chat-shell prefix
    # is iframed from /chat in the Next.js app.
    location /chat-shell/ {
        proxy_pass http://127.0.0.1:7681/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;   # keep WebSocket alive overnight
        proxy_send_timeout 86400s;
    }

    # Proxy to the local-speech-service on the Mac (HTTP). This avoids the
    # mixed-content block that would happen if the browser fetched HTTP
    # from an HTTPS page. Browser → HTTPS nginx → HTTP speech-service.
    location /speech/ {
        proxy_pass http://192.168.3.127:8765/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 20M;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
